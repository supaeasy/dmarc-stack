# dmarc-stack — parsedmarc + Elasticsearch + Grafana
#
# Ausgelegt für Synology DSM 7.2+ mit Portainer CE (Stack aus Git-Repository).
# Portainer CE unterstützt KEINE relativen Bind-Mount-Pfade in Git-Stacks,
# daher zeigen ALLE Mounts (Konfig UND Daten) auf absolute Pfade unter
# CONFIG_DIR (Default: /volume2/docker/dmarc-stack).
#
# Voraussetzungen auf dem Host (einmalig, siehe README):
#   sysctl -w vm.max_map_count=262144   (per DSM-Aufgabenplaner beim Boot)
#   Datenordner anlegen und chown'en:
#     data/elasticsearch -> uid 1000:0   data/grafana -> uid 472:0

services:

  elasticsearch:
    # NICHT auf >= 8.15 anheben, solange der Stack auf Synology läuft!
    # Der DSM-Kernel (4.4) hat kein CONFIG_SECCOMP; ab ES 8.15 ist die
    # fehlende seccomp-Sandbox ein fataler Startfehler
    # ("seccomp unavailable: CONFIG_SECCOMP not compiled into kernel").
    # 8.14.3 ist die letzte auf Synology lauffähige Version.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    labels:
      - "wud.watch=true"
      - "wud.trigger.docker.safeupdate=true"
      # Nur 8.14.x zulassen — >= 8.15 startet auf Synology nicht (seccomp)!
      - 'wud.tag.include=^8\.14\.\d+$$'
    environment:
      - node.name=elasticsearch
      - cluster.name=dmarc-stack
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.license.self_generated.type=basic
      # Tägliche Indizes über mehrere Jahre Historie sprengen sonst das
      # Default-Limit von 1000 Shards pro Node (Import bricht ab).
      - cluster.max_shards_per_node=4000
      - "ES_JAVA_OPTS=-Xms${ES_HEAP:-2g} -Xmx${ES_HEAP:-2g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # Schutz für das NAS: Elasticsearch darf maximal so viel RAM belegen.
    # Faustregel: mindestens das Doppelte des Heaps (ES_HEAP).
    mem_limit: ${ES_MEM_LIMIT:-4g}
    volumes:
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -q -e '\"status\":\"green\"' -e '\"status\":\"yellow\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - dmarc

  parsedmarc:
    image: ghcr.io/domainaware/parsedmarc:10.2.2
    restart: unless-stopped
    labels:
      - "wud.watch=true"
      - "wud.trigger.docker.safeupdate=true"
      # Nur echte Versionstags, kein "latest"
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
    # Entrypoint-Wrapper statt direktem parsedmarc-Aufruf: füllt fehlende
    # Pflichtfelder in nicht-standardkonformen Forensic-Reports (z.B. von
    # dogado/secure-mailgate) — Details siehe parsedmarc/patch_feedback_type.py
    entrypoint: ["python", "/patch_feedback_type.py"]
    command: ["-c", "/parsedmarc.ini"]
    volumes:
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/parsedmarc/parsedmarc.ini:/parsedmarc.ini:ro
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/parsedmarc/patch_feedback_type.py:/patch_feedback_type.py:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - dmarc

  grafana:
    image: grafana/grafana:12.4.5
    restart: unless-stopped
    labels:
      - "wud.watch=true"
      - "wud.trigger.docker.safeupdate=true"
      # In der 12.x-Linie bleiben (13.0.1 hatte einen ES-Datasource-Bug;
      # Major-Sprung lieber bewusst machen)
      - 'wud.tag.include=^12\.\d+\.\d+$$'
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/Grafana-DMARC_Reports.json"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: "browser"
      GF_DATE_FORMATS_DEFAULT_WEEK_START: "monday"
    volumes:
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/data/grafana:/var/lib/grafana
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${CONFIG_DIR:-/volume2/docker/dmarc-stack}/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - dmarc

networks:
  dmarc:
